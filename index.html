<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TrackORA Driver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0F172A;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: #1E293B;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        /* === HEADER === */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .app-logo {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #F8FAFC;
            letter-spacing: -0.5px;
        }
        .app-header .subtitle {
            font-size: 12px;
            color: #64748B;
            margin-top: 2px;
        }

        /* === INPUT SURAT JALAN === */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #F8FAFC;
            font-size: 16px;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .input-group input::placeholder {
            color: #475569;
        }

        /* === STATUS CARD === */
        .status-card {
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .status-card.show { display: block; }
        .status-card .status-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .status-card .status-label {
            font-size: 14px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-card .status-time {
            font-size: 13px;
            color: #64748B;
            margin-top: 4px;
        }
        .status-card .status-sj {
            font-size: 14px;
            color: #2563EB;
            font-weight: 600;
            margin-top: 8px;
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        /* === BUTTONS === */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-start {
            background: #059669;
            color: white;
        }
        .btn-start:hover { background: #047857; }
        .btn-start:disabled {
            background: #334155;
            color: #64748B;
            cursor: not-allowed;
        }
        .btn-finish {
            background: #2563EB;
            color: white;
        }
        .btn-finish:hover { background: #1D4ED8; }
        .btn-finish:disabled {
            background: #334155;
            color: #64748B;
            cursor: not-allowed;
        }
        .btn-reset {
            background: #334155;
            color: #94A3B8;
            flex: 0;
            min-width: auto;
            padding: 14px 16px;
        }
        .btn-reset:hover { background: #475569; color: #CBD5E1; }

        /* === RIWAYAT === */
        .history-section {
            margin-top: 28px;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
        .history-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .history-item {
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .history-item .sj {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 600;
            color: #2563EB;
        }
        .history-item .times {
            color: #94A3B8;
            margin-top: 4px;
            font-size: 11px;
        }
        .history-item .gps {
            color: #64748B;
            font-size: 10px;
        }
        .history-empty {
            text-align: center;
            color: #475569;
            font-size: 13px;
            padding: 20px;
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #059669;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            z-index: 999;
            animation: toastIn 0.3s ease-out;
            display: none;
        }
        .toast.show { display: block; }
        .toast.error { background: #DC2626; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* === GPS INDICATOR === */
        .gps-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #64748B;
            margin-top: 8px;
            justify-content: center;
        }
        .gps-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #DC2626;
        }
        .gps-dot.active { background: #059669; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <div class="app-header">
            <div class="app-logo">🚛</div>
            <h1>TrackORA Driver</h1>
            <p class="subtitle">Check-in & Check-out Pengiriman</p>
        </div>

        <!-- INPUT SURAT JALAN -->
        <div class="input-group">
            <label>No. Surat Jalan</label>
            <input type="text" id="inputSJ" placeholder="Masukkan No. Surat Jalan" autocomplete="off">
        </div>

        <!-- GPS STATUS -->
        <div class="gps-indicator" id="gpsIndicator">
            <div class="gps-dot" id="gpsDot"></div>
            <span id="gpsText">Menunggu GPS...</span>
        </div>

        <!-- STATUS CARD -->
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">🚛</div>
            <div class="status-label" id="statusLabel">DALAM PERJALANAN</div>
            <div class="status-time" id="statusTime"></div>
            <div class="status-sj" id="statusSJ"></div>
        </div>

        <!-- BUTTONS -->
        <div class="btn-row">
            <button class="btn btn-start" id="btnStart" onclick="mulaiPerjalanan()">
                ▶ Mulai Perjalanan
            </button>
            <button class="btn btn-finish" id="btnFinish" onclick="tibaDiTujuan()" disabled>
                🏁 Tiba di Tujuan
            </button>
            <button class="btn btn-reset" onclick="resetForm()" title="Reset">↺</button>
        </div>

        <!-- RIWAYAT -->
        <div class="history-section">
            <h3>📋 Riwayat Hari Ini</h3>
            <div id="historyList">
                <div class="history-empty">Belum ada pengiriman hari ini</div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // =============================================
        // STATE
        // =============================================
        const STORAGE_KEY = "trackora_driver_history";
        let currentSJ = null;
        let currentStatus = null; // null | 'transit' | 'delivered'
        let startTime = null;
        let startGPS = null;
        let endTime = null;
        let endGPS = null;
        let gpsReady = false;
        let gpsLat = null;
        let gpsLng = null;

        // =============================================
        // INIT
        // =============================================
        function init() {
            loadHistory();
            requestGPS();
            document.getElementById("inputSJ").addEventListener("keypress", e => {
                if (e.key === "Enter") mulaiPerjalanan();
            });
        }

        // =============================================
        // GPS
        // =============================================
        function requestGPS() {
            const dot = document.getElementById("gpsDot");
            const text = document.getElementById("gpsText");

            if (!navigator.geolocation) {
                text.textContent = "GPS tidak tersedia di perangkat ini";
                return;
            }

            text.textContent = "Mengambil lokasi...";

            navigator.geolocation.getCurrentPosition(
                pos => {
                    gpsLat = pos.coords.latitude;
                    gpsLng = pos.coords.longitude;
                    gpsReady = true;
                    dot.classList.add("active");
                    text.textContent = `Lokasi siap (akurasi ±${Math.round(pos.coords.accuracy)}m)`;
                },
                err => {
                    gpsReady = false;
                    dot.classList.remove("active");
                    text.textContent = "GPS tidak dapat diakses. Tetap bisa lanjut.";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );

            // Update GPS setiap 30 detik
            setInterval(() => {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        gpsLat = pos.coords.latitude;
                        gpsLng = pos.coords.longitude;
                        gpsReady = true;
                        dot.classList.add("active");
                    },
                    () => {},
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 30000 }
                );
            }, 30000);
        }

        function getGPSString() {
            if (gpsReady && gpsLat !== null) {
                return `${gpsLat.toFixed(6)}, ${gpsLng.toFixed(6)}`;
            }
            return "GPS tidak tersedia";
        }

        // =============================================
        // FORMAT TANGGAL
        // =============================================
        function formatDateTime() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${d}/${m}/${y} ${h}:${min}:${s}`;
        }

        // =============================================
        // MULAI PERJALANAN
        // =============================================
        function mulaiPerjalanan() {
            const sj = document.getElementById("inputSJ").value.trim();
            if (!sj) {
                showToast("Masukkan No. Surat Jalan terlebih dahulu", true);
                return;
            }

            currentSJ = sj;
            currentStatus = "transit";
            startTime = formatDateTime();
            startGPS = getGPSString();

            // Update UI
            document.getElementById("statusCard").classList.add("show");
            document.getElementById("statusIcon").textContent = "🚛";
            document.getElementById("statusLabel").textContent = "DALAM PERJALANAN";
            document.getElementById("statusTime").textContent = `Mulai: ${startTime}`;
            document.getElementById("statusSJ").textContent = `SJ: ${currentSJ}`;

            document.getElementById("btnStart").disabled = true;
            document.getElementById("btnFinish").disabled = false;
            document.getElementById("inputSJ").disabled = true;

            showToast("Perjalanan dimulai. Hati-hati di jalan.");
        }

        // =============================================
        // TIBA DI TUJUAN
        // =============================================
        function tibaDiTujuan() {
            if (!currentSJ || currentStatus !== "transit") return;

            currentStatus = "delivered";
            endTime = formatDateTime();
            endGPS = getGPSString();

            // Update UI
            document.getElementById("statusIcon").textContent = "✅";
            document.getElementById("statusLabel").textContent = "TERKIRIM";
            document.getElementById("statusTime").textContent = `Mulai: ${startTime} | Tiba: ${endTime}`;
            document.getElementById("statusSJ").textContent = `SJ: ${currentSJ}`;

            document.getElementById("btnFinish").disabled = true;

            // Simpan ke history
            saveHistory({
                sj: currentSJ,
                startTime: startTime,
                startGPS: startGPS,
                endTime: endTime,
                endGPS: endGPS
            });

            showToast("Pengiriman selesai. Data tersimpan.");
        }

        // =============================================
        // RESET FORM
        // =============================================
        function resetForm() {
            currentSJ = null;
            currentStatus = null;
            startTime = null;
            startGPS = null;
            endTime = null;
            endGPS = null;

            document.getElementById("inputSJ").value = "";
            document.getElementById("inputSJ").disabled = false;
            document.getElementById("inputSJ").focus();

            document.getElementById("statusCard").classList.remove("show");
            document.getElementById("btnStart").disabled = false;
            document.getElementById("btnFinish").disabled = true;

            // Refresh GPS
            requestGPS();
        }

        // =============================================
        // HISTORY (localStorage)
        // =============================================
        function saveHistory(entry) {
            const today = new Date().toDateString();
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

            if (!history[today]) history[today] = [];
            history[today].unshift(entry);

            // Simpan maksimal 50 entry per hari
            if (history[today].length > 50) history[today] = history[today].slice(0, 50);

            // Hapus data lebih dari 7 hari
            const keys = Object.keys(history);
            if (keys.length > 7) {
                const oldest = keys.sort()[0];
                delete history[oldest];
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const today = new Date().toDateString();
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const todayHistory = history[today] || [];

            const container = document.getElementById("historyList");

            if (todayHistory.length === 0) {
                container.innerHTML = '<div class="history-empty">Belum ada pengiriman hari ini</div>';
                return;
            }

            let html = "";
            for (let entry of todayHistory) {
                html += `
                    <div class="history-item">
                        <div class="sj">📋 ${entry.sj}</div>
                        <div class="times">▶ ${entry.startTime} → 🏁 ${entry.endTime}</div>
                        <div class="gps">📍 Mulai: ${entry.startGPS} | Tiba: ${entry.endGPS}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // =============================================
        // TOAST
        // =============================================
        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.remove("error");
            if (isError) toast.classList.add("error");
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        // =============================================
        // START
        // =============================================
        init();
        document.getElementById("inputSJ").focus();
    </script>
</body>
</html>
