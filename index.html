<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TrackORA Driver v3.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0F172A;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: #1E293B;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        .app-header { text-align: center; margin-bottom: 28px; }
        .app-logo { font-size: 40px; margin-bottom: 8px; }
        .app-header h1 { font-size: 22px; font-weight: 700; color: #F8FAFC; letter-spacing: -0.5px; }
        .app-header .subtitle { font-size: 12px; color: #64748B; margin-top: 2px; }

        .version-badge {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 10px;
            color: #64748B;
            background: #0F172A;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block; font-size: 12px; font-weight: 600; color: #94A3B8;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-group input {
            flex: 1; padding: 14px 16px; background: #0F172A;
            border: 1px solid #334155; border-radius: 8px; color: #F8FAFC;
            font-size: 16px; font-family: 'SF Mono', 'Courier New', monospace;
            outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        .input-group input::placeholder { color: #475569; }

        .btn-scan {
            padding: 14px 16px; background: #7C3AED; color: white;
            border: none; border-radius: 8px; font-size: 18px; cursor: pointer;
            transition: background 0.2s; white-space: nowrap;
        }
        .btn-scan:hover { background: #6D28D9; }
        .btn-scan.active { background: #DC2626; animation: pulse-scan 1.5s infinite; }
        @keyframes pulse-scan {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
            70% { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
        }

        .qr-video-container {
            display: none; margin-bottom: 16px; border-radius: 8px; overflow: hidden;
            border: 2px solid #334155;
        }
        .qr-video-container.show { display: block; }
        #qr-video { width: 100%; display: block; }

        .scan-status {
            font-size: 11px; color: #64748B; margin-top: 6px; text-align: center;
            min-height: 16px;
        }
        .scan-status.success { color: #059669; }
        .scan-status.error { color: #DC2626; }

        /* SJ LIST */
        .sj-list-section { display: none; margin-top: 16px; }
        .sj-list-section.show { display: block; }
        .sj-list-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .sj-list-header span {
            font-size: 12px; color: #94A3B8; font-weight: 600;
        }
        .sj-list-item {
            background: #0F172A; border: 1px solid #334155; border-radius: 8px;
            padding: 12px 14px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 14px; color: #F8FAFC;
        }
        .sj-list-item .remove-sj {
            color: #DC2626; cursor: pointer; font-size: 16px; padding: 4px;
        }

        .btn-add-sj {
            width: 100%; padding: 12px; background: #334155; color: #CBD5E1;
            border: 1px dashed #64748B; border-radius: 8px; font-size: 14px;
            cursor: pointer; text-align: center; margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-add-sj:hover { background: #475569; }

        /* TRIP SECTION */
        .trip-section { display: none; }
        .trip-section.show { display: block; }
        .trip-item {
            background: #0F172A; border: 1px solid #334155; border-radius: 8px;
            padding: 14px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .trip-item.delivered { opacity: 0.6; border-color: #059669; }
        .trip-item .sj-code {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 600; color: #F8FAFC; font-size: 14px;
        }
        .trip-item .sj-status {
            font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 4px;
            text-transform: uppercase;
        }
        .status-transit { background: #2563EB; color: #EFF6FF; }
        .status-delivered { background: #059669; color: #ECFDF5; }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .btn {
            flex: 1; min-width: 100px; padding: 14px 20px; border: none;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .btn-start { background: #059669; color: white; }
        .btn-start:hover { background: #047857; }
        .btn-start:disabled { background: #334155; color: #64748B; cursor: not-allowed; }
        .btn-reset { background: #334155; color: #94A3B8; flex: 0; min-width: auto; padding: 14px 16px; }
        .btn-reset:hover { background: #475569; color: #CBD5E1; }

        /* HISTORY */
        .history-section {
            margin-top: 28px; border-top: 1px solid #334155; padding-top: 20px;
            display: none;
        }
        .history-section.show { display: block; }
        .history-section h3 {
            font-size: 13px; font-weight: 600; color: #64748B;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
        }
        .history-item {
            background: #0F172A; border: 1px solid #334155; border-radius: 8px;
            padding: 12px 14px; margin-bottom: 8px; font-size: 13px;
        }
        .history-item .sj {
            font-family: 'SF Mono', 'Courier New', monospace; font-weight: 600; color: #2563EB;
        }
        .history-item .times { color: #94A3B8; margin-top: 4px; font-size: 11px; }
        .history-item .gps { color: #64748B; font-size: 10px; }
        .history-empty { text-align: center; color: #475569; font-size: 13px; padding: 20px; }

        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #059669; color: white; padding: 12px 24px; border-radius: 8px;
            font-size: 13px; font-weight: 600; z-index: 999;
            animation: toastIn 0.3s ease-out; display: none;
        }
        .toast.show { display: block; }
        .toast.error { background: #DC2626; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .gps-indicator {
            display: flex; align-items: center; gap: 6px; font-size: 11px;
            color: #64748B; margin-top: 8px; justify-content: center;
        }
        .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #DC2626; }
        .gps-dot.active { background: #059669; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- VERSION BADGE -->
        <div class="version-badge">v3.1</div>

        <div class="app-header">
            <div class="app-logo">🚛</div>
            <h1>TrackORA Driver</h1>
            <p class="subtitle">Check-in & Check-out Pengiriman</p>
        </div>

        <!-- INPUT SATU SURAT JALAN -->
        <div class="input-group" id="inputSection">
            <label>No. Surat Jalan</label>
            <div class="input-row">
                <input type="text" id="inputSJ" placeholder="Scan atau ketik No. SJ" autocomplete="off">
                <button class="btn-scan" id="btnScan" onclick="toggleScanner()" title="Scan QR">📷</button>
                <button class="btn btn-start" onclick="addSJ()" style="flex:0;min-width:auto;padding:14px 16px;font-size:18px;">+</button>
            </div>
            <div class="scan-status" id="scanStatus"></div>
        </div>

        <!-- QR VIDEO -->
        <div class="qr-video-container" id="qrContainer">
            <video id="qr-video" playsinline></video>
        </div>

        <!-- SJ LIST -->
        <div class="sj-list-section" id="sjListSection">
            <div class="sj-list-header">
                <span>📋 Daftar Surat Jalan (<span id="sjCount">0</span>)</span>
            </div>
            <div id="sjList"></div>
            <button class="btn btn-start" id="btnStartTrip" onclick="startTrip()" style="width:100%;margin-top:12px;" disabled>
                ▶ Mulai Perjalanan
            </button>
        </div>

        <!-- GPS -->
        <div class="gps-indicator" id="gpsIndicator">
            <div class="gps-dot" id="gpsDot"></div>
            <span id="gpsText">Menunggu GPS...</span>
        </div>

        <!-- TRIP SECTION -->
        <div class="trip-section" id="tripSection">
            <p style="font-size:12px;color:#94A3B8;margin-bottom:12px;text-align:center;">🟣 Klik SJ untuk check-out | ✅ Sudah tiba</p>
            <div id="tripList"></div>
            <div class="btn-row">
                <button class="btn btn-reset" onclick="resetForm()" title="Reset">↺ Trip Baru</button>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="history-section" id="historySection">
            <h3>📋 Riwayat Hari Ini</h3>
            <div id="historyList">
                <div class="history-empty">Belum ada pengiriman hari ini</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // =============================================
        // STATE
        // =============================================
        const STORAGE_KEY = "trackora_driver_history";
        let sjList = [];               // array string No. SJ yang sudah di-add
        let currentTrip = [];          // array of { sj, status, startTime, startGPS, endTime, endGPS }
        let tripActive = false;
        let gpsReady = false, gpsLat = null, gpsLng = null;
        let scannerActive = false;
        let scanLoopId = null;

        // =============================================
        // INIT
        // =============================================
        function init() {
            loadHistory();
            requestGPS();
            document.getElementById("inputSJ").addEventListener("keypress", e => {
                if (e.key === "Enter") addSJ();
            });
            document.getElementById("inputSJ").focus();
        }

        // =============================================
        // ADD SJ (satu per satu)
        // =============================================
        function addSJ() {
            const sj = document.getElementById("inputSJ").value.trim();
            if (!sj) {
                showToast("Masukkan No. Surat Jalan", true);
                return;
            }

            // Cek duplikat
            if (sjList.includes(sj)) {
                showToast("No. Surat Jalan sudah ada di daftar", true);
                document.getElementById("inputSJ").value = "";
                document.getElementById("inputSJ").focus();
                return;
            }

            sjList.push(sj);
            document.getElementById("inputSJ").value = "";
            document.getElementById("inputSJ").focus();
            renderSJList();
            showToast(`✅ ${sj} ditambahkan`);
        }

        // =============================================
        // REMOVE SJ
        // =============================================
        function removeSJ(index) {
            const removed = sjList.splice(index, 1)[0];
            renderSJList();
            showToast(`❌ ${removed} dihapus`);
            document.getElementById("inputSJ").focus();
        }

        // =============================================
        // RENDER SJ LIST
        // =============================================
        function renderSJList() {
            const container = document.getElementById("sjList");
            const section = document.getElementById("sjListSection");
            const btnStart = document.getElementById("btnStartTrip");
            const countEl = document.getElementById("sjCount");

            if (sjList.length === 0) {
                section.classList.remove("show");
                return;
            }

            section.classList.add("show");
            countEl.textContent = sjList.length;
            btnStart.disabled = false;

            let html = "";
            sjList.forEach((sj, index) => {
                html += `
                    <div class="sj-list-item">
                        <span>📋 ${sj}</span>
                        <span class="remove-sj" onclick="event.stopPropagation();removeSJ(${index})">✕</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // =============================================
        // START TRIP (check-in semua SJ sekaligus)
        // =============================================
        function startTrip() {
            if (sjList.length === 0) {
                showToast("Tambahkan minimal 1 Surat Jalan", true);
                return;
            }

            const startTime = formatDateTime();
            const startGPS = getGPSString();

            currentTrip = sjList.map(sj => ({
                sj,
                status: 'transit',
                startTime,
                startGPS,
                endTime: null,
                endGPS: null
            }));

            tripActive = true;

            // Sembunyikan input & SJ list
            document.getElementById("inputSection").style.display = "none";
            document.getElementById("sjListSection").classList.remove("show");
            document.getElementById("tripSection").classList.add("show");
            document.getElementById("historySection").classList.add("show");
            stopScanner();

            renderTripList();
            showToast(`${sjList.length} surat jalan dimulai.`);
        }

        // =============================================
        // RENDER TRIP LIST
        // =============================================
        function renderTripList() {
            const container = document.getElementById("tripList");
            let html = "";

            currentTrip.forEach((trip, index) => {
                const delivered = trip.status === 'delivered';
                html += `
                    <div class="trip-item ${delivered ? 'delivered' : ''}" onclick="${delivered ? '' : `checkOut(${index})`}">
                        <div>
                            <div class="sj-code">📋 ${trip.sj}</div>
                            <div style="font-size:10px;color:#94A3B8;margin-top:2px;">Mulai: ${trip.startTime}</div>
                            ${delivered ? `<div style="font-size:10px;color:#059669;margin-top:2px;">Tiba: ${trip.endTime}</div>` : ''}
                        </div>
                        <span class="sj-status ${delivered ? 'status-delivered' : 'status-transit'}">
                            ${delivered ? '✅ Tiba' : '🚛 Transit'}
                        </span>
                    </div>
                `;
            });

            container.innerHTML = html;

            const allDelivered = currentTrip.every(t => t.status === 'delivered');
            if (allDelivered) {
                showToast("Semua surat jalan telah tiba. Trip selesai! 🎉");
                currentTrip.forEach(trip => {
                    saveHistory({
                        sj: trip.sj,
                        startTime: trip.startTime,
                        startGPS: trip.startGPS,
                        endTime: trip.endTime,
                        endGPS: trip.endGPS
                    });
                });
            }
        }

        // =============================================
        // CHECK-OUT SATU SJ
        // =============================================
        function checkOut(index) {
            const trip = currentTrip[index];
            if (!trip || trip.status === 'delivered') return;

            if (!confirm(`Konfirmasi tiba di tujuan untuk:\n${trip.sj}\n\nKlik OK untuk check-out.`)) {
                return;
            }

            trip.status = 'delivered';
            trip.endTime = formatDateTime();
            trip.endGPS = getGPSString();

            renderTripList();
            showToast(`✅ ${trip.sj} telah tiba.`);
        }

        // =============================================
        // QR SCANNER (BarcodeDetector API)
        // =============================================
        function toggleScanner() {
            const container = document.getElementById("qrContainer");
            const btn = document.getElementById("btnScan");
            const statusEl = document.getElementById("scanStatus");

            if (scannerActive) {
                stopScanner();
                return;
            }

            if (!('BarcodeDetector' in window)) {
                showToast("Browser tidak mendukung scan QR. Masukkan manual.", true);
                return;
            }

            container.classList.add("show");
            btn.classList.add("active");
            btn.textContent = "✕";
            scannerActive = true;
            statusEl.textContent = "Arahkan kamera ke QR code...";
            statusEl.className = "scan-status";

            const video = document.getElementById("qr-video");
            const barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });

            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            })
            .then(stream => {
                video.srcObject = stream;
                video.play();
                scanLoop(barcodeDetector, video);
            })
            .catch(() => {
                statusEl.textContent = "❌ Tidak bisa akses kamera. Masukkan manual.";
                statusEl.className = "scan-status error";
                stopScanner();
            });
        }

        function scanLoop(detector, video) {
            if (!scannerActive) return;
            detector.detect(video)
                .then(codes => {
                    if (codes.length > 0) {
                        document.getElementById("inputSJ").value = codes[0].rawValue;
                        document.getElementById("scanStatus").textContent = `✅ Terbaca: ${codes[0].rawValue}`;
                        document.getElementById("scanStatus").className = "scan-status success";
                        showToast(`Terbaca: ${codes[0].rawValue}`);
                        stopScanner();
                        // Auto-add setelah scan
                        setTimeout(() => addSJ(), 500);
                    } else {
                        scanLoopId = requestAnimationFrame(() => scanLoop(detector, video));
                    }
                })
                .catch(() => {
                    scanLoopId = requestAnimationFrame(() => scanLoop(detector, video));
                });
        }

        function stopScanner() {
            scannerActive = false;
            if (scanLoopId) {
                cancelAnimationFrame(scanLoopId);
                scanLoopId = null;
            }
            const video = document.getElementById("qr-video");
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            document.getElementById("qrContainer").classList.remove("show");
            const btn = document.getElementById("btnScan");
            btn.classList.remove("active");
            btn.textContent = "📷";
        }

        // =============================================
        // GPS
        // =============================================
        function requestGPS() {
            const dot = document.getElementById("gpsDot");
            const text = document.getElementById("gpsText");
            if (!navigator.geolocation) {
                text.textContent = "GPS tidak tersedia";
                return;
            }
            text.textContent = "Mengambil lokasi...";
            navigator.geolocation.getCurrentPosition(
                pos => {
                    gpsLat = pos.coords.latitude;
                    gpsLng = pos.coords.longitude;
                    gpsReady = true;
                    dot.classList.add("active");
                    text.textContent = `Lokasi siap (±${Math.round(pos.coords.accuracy)}m)`;
                },
                () => {
                    gpsReady = false;
                    dot.classList.remove("active");
                    text.textContent = "GPS tidak dapat diakses. Tetap bisa lanjut.";
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        }

        function getGPSString() {
            if (gpsReady && gpsLat !== null) return `${gpsLat.toFixed(6)}, ${gpsLng.toFixed(6)}`;
            return "GPS tidak tersedia";
        }

        function formatDateTime() {
            const now = new Date();
            return `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }

        // =============================================
        // RESET
        // =============================================
        function resetForm() {
            stopScanner();
            sjList = [];
            currentTrip = [];
            tripActive = false;
            document.getElementById("inputSJ").value = "";
            document.getElementById("inputSection").style.display = "block";
            document.getElementById("sjListSection").classList.remove("show");
            document.getElementById("tripSection").classList.remove("show");
            document.getElementById("historySection").classList.remove("show");
            document.getElementById("scanStatus").textContent = "";
            document.getElementById("scanStatus").className = "scan-status";
            document.getElementById("inputSJ").focus();
            requestGPS();
            showToast("Form di-reset.");
        }

        // =============================================
        // HISTORY
        // =============================================
        function saveHistory(entry) {
            const today = new Date().toDateString();
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            if (!history[today]) history[today] = [];
            history[today].unshift(entry);
            if (history[today].length > 50) history[today] = history[today].slice(0, 50);
            const keys = Object.keys(history);
            if (keys.length > 7) delete history[keys.sort()[0]];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const today = new Date().toDateString();
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            const todayHistory = history[today] || [];
            const container = document.getElementById("historyList");
            if (todayHistory.length === 0) {
                container.innerHTML = '<div class="history-empty">Belum ada pengiriman hari ini</div>';
                return;
            }
            container.innerHTML = todayHistory.map(e => `
                <div class="history-item">
                    <div class="sj">📋 ${e.sj}</div>
                    <div class="times">▶ ${e.startTime} → 🏁 ${e.endTime}</div>
                    <div class="gps">📍 Mulai: ${e.startGPS} | Tiba: ${e.endGPS}</div>
                </div>
            `).join("");
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.toggle("error", isError);
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        init();
    </script>
</body>
</html>
